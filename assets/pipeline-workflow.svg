<svg viewBox="0 0 1000 460" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <rect width="1000" height="460" fill="#0a0c10"/>

  <!-- Server -->
  <rect x="400" y="20" width="200" height="50" rx="8" fill="#1f6feb" stroke="#58a6ff" stroke-width="2"/>
  <text x="500" y="52" font-size="16" fill="#fff" text-anchor="middle">SSE Server</text>

  <line x1="500" y1="70" x2="500" y2="110" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Network reader -->
  <rect x="380" y="112" width="240" height="50" rx="8" fill="#30363d" stroke="#8b949e" stroke-width="2"/>
  <text x="500" y="144" font-size="16" fill="#e6edf3" text-anchor="middle">Network Reader (demux)</text>

  <!-- fork lines -->
  <line x1="440" y1="162" x2="220" y2="210" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="162" x2="780" y2="210" stroke="#cf222e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Cognitive pipeline -->
  <rect x="80" y="212" width="280" height="90" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
  <text x="220" y="238" font-size="15" fill="#3fb950" text-anchor="middle" font-weight="bold">Cognitive Pipeline</text>
  <text x="220" y="262" font-size="12" fill="#c9d1d9" text-anchor="middle">renders every delta the instant</text>
  <text x="220" y="280" font-size="12" fill="#c9d1d9" text-anchor="middle">it arrives, no dependency on closure</text>

  <line x1="220" y1="302" x2="220" y2="345" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowg)"/>
  <rect x="70" y="347" width="300" height="55" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
  <text x="220" y="372" font-size="14" fill="#3fb950" text-anchor="middle" font-weight="bold">100% of text reaches the user</text>
  <text x="220" y="390" font-size="11" fill="#7d8590" text-anchor="middle">even if the stream fails later</text>

  <!-- Administrative pipeline -->
  <rect x="640" y="212" width="280" height="90" rx="8" fill="#0d1117" stroke="#cf222e" stroke-width="2"/>
  <text x="780" y="238" font-size="15" fill="#ff7b72" text-anchor="middle" font-weight="bold">Administrative Pipeline</text>
  <text x="780" y="262" font-size="12" fill="#c9d1d9" text-anchor="middle">waits for the one final usage</text>
  <text x="780" y="280" font-size="12" fill="#c9d1d9" text-anchor="middle">frame near the end of the stream</text>

  <line x1="780" y1="302" x2="780" y2="345" stroke="#cf222e" stroke-width="2" marker-end="url(#arrowr)" stroke-dasharray="6,4"/>
  <rect x="630" y="347" width="300" height="55" rx="8" fill="#0d1117" stroke="#cf222e" stroke-width="2"/>
  <text x="780" y="372" font-size="14" fill="#ff7b72" text-anchor="middle" font-weight="bold">frame never arrives</text>
  <text x="780" y="390" font-size="11" fill="#7d8590" text-anchor="middle">telemetry frozen, no rollback fired</text>

  <!-- seam label -->
  <line x1="500" y1="162" x2="500" y2="420" stroke="#d29922" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="420" y="410" width="160" height="30" rx="6" fill="#d29922"/>
  <text x="500" y="431" font-size="13" fill="#0a0c10" text-anchor="middle" font-weight="bold">THE SEAM</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/></marker>
    <marker id="arrowg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3fb950"/></marker>
    <marker id="arrowr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#cf222e"/></marker>
  </defs>

  <text x="500" y="450" font-size="13" fill="#8b949e" text-anchor="middle">Two pipelines, one transport, no shared completion contract</text>
</svg>
