<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1000" height="420" fill="#fbfaf7"/>

  <!-- Left scene: ticker + finished coffee -->
  <g>
    <rect x="30" y="30" width="440" height="360" rx="16" fill="#fff" stroke="#e4dfd6" stroke-width="2"/>
    <rect x="55" y="55" width="390" height="46" rx="8" fill="#1f2430"/>
    <text x="250" y="85" font-size="20" fill="#3fd97f" text-anchor="middle" font-family="Consolas, monospace">SAM &#8226; ORDER READY</text>

    <!-- barista -->
    <circle cx="160" cy="220" r="34" fill="#f2c9a0"/>
    <rect x="120" y="252" width="80" height="90" rx="18" fill="#5b7fdb"/>

    <!-- coffee cup, complete, steaming -->
    <g transform="translate(300,230)">
      <path d="M0,40 h90 l-8,70 a20,20 0 0 1 -20,18 h-34 a20,20 0 0 1 -20,-18 z" fill="#ffffff" stroke="#c8beae" stroke-width="3"/>
      <rect x="-4" y="30" width="98" height="14" rx="6" fill="#6f4e37"/>
      <path d="M20,10 q6,-14 0,-24" stroke="#c8beae" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M45,6 q6,-14 0,-24" stroke="#c8beae" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M70,10 q6,-14 0,-24" stroke="#c8beae" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>

    <text x="250" y="380" font-size="18" fill="#3fa35e" text-anchor="middle" font-weight="bold">Full drink handed over. Visible progress the whole time.</text>
  </g>

  <!-- Right scene: frozen register -->
  <g>
    <rect x="530" y="30" width="440" height="360" rx="16" fill="#fff" stroke="#e4dfd6" stroke-width="2"/>

    <!-- register -->
    <rect x="640" y="120" width="220" height="140" rx="10" fill="#2b2f38"/>
    <rect x="660" y="140" width="180" height="60" rx="4" fill="#0a0c10"/>
    <text x="750" y="180" font-size="26" fill="#e5484d" text-anchor="middle" font-family="Consolas, monospace" font-weight="bold">$0.00</text>
    <rect x="660" y="212" width="180" height="30" rx="4" fill="#0a0c10"/>
    <text x="750" y="233" font-size="13" fill="#e5484d" text-anchor="middle" font-family="Consolas, monospace">NO SALE RECORDED</text>
    <rect x="700" y="260" width="100" height="18" rx="4" fill="#484f5c"/>

    <text x="750" y="330" font-size="18" fill="#cf222e" text-anchor="middle" font-weight="bold">The receipt printer jammed after handoff.</text>
    <text x="750" y="356" font-size="18" fill="#cf222e" text-anchor="middle" font-weight="bold">The books show nothing ever sold.</text>
  </g>

  <text x="500" y="410" font-size="15" fill="#8b7d68" text-anchor="middle">Real time progress and real time accounting are not the same guarantee.</text>
</svg>
