<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <rect width="900" height="320" fill="#05060a"/>

  <!-- Left: terminal, speculative render then hard rollback -->
  <rect x="0" y="0" width="450" height="320" fill="#0d1117"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="20" y="60" font-size="15" fill="#3fb950">$ python secure_client_app.py a 5</text>

  <clipPath id="revealR">
    <rect x="18" y="75" height="30" width="0">
      <animate attributeName="width" values="0;410;410;410" keyTimes="0;0.35;1;1" dur="7s" repeatCount="indefinite"/>
    </rect>
  </clipPath>
  <text x="20" y="95" font-size="16" fill="#e6edf3" clip-path="url(#revealR)">
    The quick brown fox jumps
    <animate attributeName="opacity" values="1;1;1;0;0" keyTimes="0;0.35;0.5;0.52;1" dur="7s" repeatCount="indefinite"/>
  </text>

  <text x="20" y="150" font-size="15" fill="#ff7b72" font-weight="bold" opacity="0">
    [INTEGRITY ALERT] output rolled back
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.52;0.56;0.9;1" dur="7s" repeatCount="indefinite"/>
  </text>
  <text x="20" y="175" font-size="13" fill="#7d8590" opacity="0">
    reason: malformed usage frame
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.55;0.58;0.9;1" dur="7s" repeatCount="indefinite"/>
  </text>

  <!-- Right: session_history.json, filled then purged -->
  <rect x="450" y="0" width="450" height="320" fill="#f6f8fa"/>
  <circle cx="474" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="494" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="514" cy="22" r="6" fill="#27c93f"/>
  <text x="470" y="60" font-size="15" fill="#57606a">$ cat session_history.json</text>

  <g opacity="1">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.53;1" dur="7s" repeatCount="indefinite"/>
    <text x="470" y="95" font-size="14" fill="#24292f">[ &#123; "status": "provisional",</text>
    <text x="490" y="118" font-size="14" fill="#1a7f37">"text": "The quick brown fox jumps" &#125; ]</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.53;0.56;1" dur="7s" repeatCount="indefinite"/>
    <text x="470" y="95" font-size="18" fill="#cf222e" font-weight="bold">[ ]</text>
    <text x="470" y="122" font-size="13" fill="#57606a">purged, nothing durable survived</text>
  </g>

  <line x1="450" y1="0" x2="450" y2="320" stroke="#30363d" stroke-width="2"/>
  <text x="450" y="308" font-size="13" fill="#8b949e" text-anchor="middle">Speculative rendering, then a hard rollback the instant the handshake fails</text>
</svg>
